apiVersion: apps/v1
kind: Deployment
metadata:
  name: layer7-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: layer7-demo-app
  template:
    metadata:
      labels:
        app: layer7-demo-app
    spec:
      containers:
        - name: app
          image: REPLACE_ECR_IMAGE
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: layer7-demo-service
spec:
  type: ClusterIP
  selector:
    app: layer7-demo-app
  ports:
    - port: 80
      targetPort: 8080
